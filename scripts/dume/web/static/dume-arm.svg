<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b7280;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base / Cart -->
  <g class="dume-base">
    <!-- Platform -->
    <path d="M50,235 L150,235 L160,250 L40,250 Z" fill="url(#darkMetal)" stroke="#374151" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="60" cy="253" r="7" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="60" cy="253" r="3" fill="#6b7280"/>
    <circle cx="140" cy="253" r="7" fill="#1f2937" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="140" cy="253" r="3" fill="#6b7280"/>
    <!-- Center caster -->
    <circle cx="100" cy="255" r="4" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
  </g>

  <!-- Shoulder joint -->
  <g class="dume-shoulder" filter="url(#shadow)">
    <rect x="85" y="210" width="30" height="30" rx="4" fill="url(#darkMetal)" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="100" cy="225" r="8" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="100" cy="225" r="3" fill="#f0b429"/>
  </g>

  <!-- Lower arm segment -->
  <g class="dume-lower-arm">
    <rect x="92" y="145" width="16" height="70" rx="6" fill="url(#metalGrad)" stroke="#6b7280" stroke-width="1"/>
    <!-- Hydraulic detail -->
    <line x1="96" y1="155" x2="96" y2="205" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
    <line x1="104" y1="160" x2="104" y2="200" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Elbow joint -->
  <g class="dume-elbow">
    <circle cx="100" cy="145" r="10" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="100" cy="145" r="4" fill="#f0b429"/>
  </g>

  <!-- Upper arm segment -->
  <g class="dume-upper-arm">
    <rect x="90" y="75" width="20" height="75" rx="8" fill="url(#metalGrad)" stroke="#6b7280" stroke-width="1"/>
    <!-- Hydraulic detail -->
    <line x1="95" y1="85" x2="95" y2="140" stroke="#4b5563" stroke-width="2" stroke-linecap="round"/>
    <!-- Cable -->
    <path d="M105,80 Q115,100 105,120 Q95,135 105,145" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>

  <!-- Wrist joint -->
  <g class="dume-wrist">
    <circle cx="100" cy="72" r="7" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="100" cy="72" r="3" fill="#d4920c"/>
  </g>

  <!-- Claw / Gripper -->
  <g class="dume-claw">
    <!-- Left finger -->
    <path class="claw-left" d="M90,70 L80,45 L85,40 L95,60" fill="url(#metalGrad)" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Right finger -->
    <path class="claw-right" d="M110,70 L120,45 L115,40 L105,60" fill="url(#metalGrad)" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Finger tips -->
    <circle cx="82" cy="42" r="3" fill="#f0b429"/>
    <circle cx="118" cy="42" r="3" fill="#f0b429"/>
  </g>

  <!-- Eye / Camera sensor -->
  <g class="dume-eye">
    <circle cx="100" cy="55" r="8" fill="#1f2937" stroke="#6b7280" stroke-width="1.5"/>
    <circle class="eye-lens" cx="100" cy="55" r="5" fill="#0ea5e9"/>
    <circle cx="100" cy="55" r="2" fill="#fff" opacity="0.6"/>
    <!-- Lens flare -->
    <circle cx="103" cy="52" r="1" fill="#fff" opacity="0.8"/>
  </g>

  <!-- Status LED on shoulder -->
  <circle class="status-led" cx="100" cy="215" r="3" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
