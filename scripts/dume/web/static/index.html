<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dum-E Records — Knowledge Database Management</title>
  <link rel="stylesheet" href="/static/dume.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>

<div id="app">
  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="header-left">
      <h1>🤖 DUM-E RECORDS</h1>
      <span class="subtitle">Knowledge Database Management System</span>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <span class="status-dot ct104-dot offline"></span>
        <span class="ct104-label">CT104: Checking…</span>
      </div>
      <div class="status-badge">
        <span class="files-badge">Files: —</span>
      </div>
      <button class="btn btn-sm btn-secondary" id="btn-dashboard">◉ Dashboard</button>
    </div>
  </header>

  <!-- ═══ SIDEBAR — FILE BROWSER ═══ -->
  <aside class="sidebar">
    <div class="sidebar-toolbar">
      <button class="btn btn-sm btn-primary" id="btn-sync-selected" disabled>⚡ Sync Selected</button>
      <button class="btn btn-sm btn-secondary" id="btn-sync-new">🔄 Sync New</button>
    </div>
    <div class="file-tree"></div>
    <div style="padding:8px 12px;border-top:1px solid rgba(255,255,255,.05)">
      <button class="btn btn-sm btn-danger" id="btn-reset-manifest" style="width:100%">🗑 Reset Manifest</button>
    </div>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main">
    <!-- Populated by JS -->
  </main>

  <!-- ═══ SEARCH BAR ═══ -->
  <div class="search-bar">
    <span style="color:var(--accent);font-size:16px">🔍</span>
    <input type="text" id="search-input" placeholder="Search CT104 knowledge base…">
    <button class="btn btn-primary" id="btn-search">Search</button>
    <button class="btn btn-secondary" id="btn-export">📥 Export</button>
  </div>
</div>

<!-- ═══ CONTEXT MENU ═══ -->
<div class="context-menu">
  <div class="context-menu-item" id="ctx-ingest">⚡ Ingest</div>
  <div class="context-menu-item" id="ctx-detail">📋 View Details</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item" id="ctx-force">🔄 Force Re-ingest</div>
</div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container"></div>

<script src="/static/dume.js"></script>
</body>
</html>
