# H.U.G.H. — Nginx Configuration for LFM Daisy Chain
#
# Three-Tier Voice Architecture:
#   Tier 1: LFM2.5-Audio-1.5B (CT102:8083) — Hugh's real voice, 3.6x RT on CPU
#   Tier 2: Piper TTS (PVE:8082) — fast fallback, 20x RT, lessac voice
#   Tier 3: Browser speechSynthesis — last resort (handled client-side)
#
# Architecture:
#   Browser → VPS nginx (:443) → {
#     /api/audio/lfm/*            → 100.90.128.2:8083 (LFM Audio S2S, CT102 via WG)
#     /api/audio/piper/*          → 100.90.128.2:8082 (Piper TTS, PVE host via WG)
#     /api/inference/v1/chat/*    → localhost:8080     (LFM Thinking, VPS local)
#     /api/inference/v1/vl/*      → 100.90.128.2:8081 (LFM VL, future)
#   }
#
# Prerequisites:
#   1. Pangolin site resources configured for lfm-proxmox (siteId 4)
#   2. Newt connected and WireGuard tunnel established
#   3. Services: hugh-audio-s2s (CT102:8083), hugh-tts (PVE:8082)
#

# ── Upstreams ────────────────────────────────────────────────
# Proxmox via Pangolin WireGuard (newtSubnet: 100.90.128.2/24)

upstream lfm_audio {
    server 100.90.128.2:8083;    # LFM2.5-Audio-1.5B on CT102
    keepalive 4;
}

upstream piper_tts {
    server 100.90.128.2:8082;    # Piper TTS on PVE host
    keepalive 4;
}

upstream lfm_vl {
    server 100.90.128.2:8081;    # LFM VL (future)
    keepalive 4;
}

upstream lfm_thinking {
    server 127.0.0.1:8080;      # LFM Thinking on VPS
    keepalive 8;
}

# ── Location Blocks ──────────────────────────────────────────
# Add inside server {} block for workshop.grizzlymedicine.icu

# Tier 1: LFM Audio (primary TTS + S2S transcription)
# Endpoints: /v1/audio/speech (TTS), /v1/audio/s2s (transcription), /health
location /api/audio/lfm/ {
    proxy_pass http://lfm_audio/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 10M;
}

# Tier 2: Piper TTS (fast fallback)
# Endpoints: /synthesize (POST), /health (GET)
location /api/audio/piper/ {
    proxy_pass http://piper_tts/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 10s;
    proxy_send_timeout 10s;
}

# LFM Thinking (SSE streaming from VPS)
location /api/inference/v1/chat/ {
    proxy_pass http://lfm_thinking/v1/chat/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# LFM VL (future — vision-language on Proxmox)
location /api/inference/v1/vl/ {
    proxy_pass http://lfm_vl/v1/vl/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 5M;
}

# ── Health Checks ────────────────────────────────────────────
location /api/health/audio {
    proxy_pass http://lfm_audio/health;
    proxy_read_timeout 5s;
}

location /api/health/piper {
    proxy_pass http://piper_tts/health;
    proxy_read_timeout 5s;
}

location /api/health/vl {
    proxy_pass http://lfm_vl/health;
    proxy_read_timeout 5s;
}

location /api/health/thinking {
    proxy_pass http://lfm_thinking/health;
    proxy_read_timeout 5s;
}
