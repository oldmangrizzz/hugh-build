# H.U.G.H. — Nginx Configuration for LFM Daisy Chain
#
# Add this to the VPS nginx config to route Audio S2S and VL
# requests to the Proxmox iMac via the Pangolin WireGuard tunnel.
#
# Architecture:
#   Browser → VPS nginx (:443) → {
#     /api/inference/v1/chat/*    → localhost:8080 (LFM Thinking, local VPS)
#     /api/inference/v1/audio/*   → 100.90.128.2:8083 (LFM Audio S2S, Proxmox via WG)
#     /api/inference/v1/vl/*      → 100.90.128.2:8081 (LFM VL, Proxmox via WG)
#     /api/tts/*                  → 100.90.128.2:8082 (Piper TTS, Proxmox via WG)
#   }
#
# Prerequisites:
#   1. Pangolin site resources configured for lfm-proxmox (siteId 4)
#      - Host resource for 192.168.7.232 with TCP ports 8081-8083
#   2. Newt connected and WireGuard tunnel established
#   3. Services running on Proxmox: Piper TTS (:8082), LFM Audio (:8083)
#

# Proxmox iMac via Pangolin WireGuard tunnel (lfm-proxmox Newt)
# WG IP assigned by Pangolin site 4 (newtSubnet: 100.90.128.2/24)
upstream lfm_audio_s2s {
    server 100.90.128.2:8082;
    keepalive 4;
}

upstream lfm_vl {
    server 100.90.128.2:8081;
    keepalive 4;
}

upstream piper_tts {
    server 100.90.128.2:8082;
    keepalive 4;
}

upstream lfm_audio_s2s_8083 {
    server 100.90.128.2:8083;
    keepalive 4;
}

upstream lfm_thinking {
    server 127.0.0.1:8080;
    keepalive 8;
}

