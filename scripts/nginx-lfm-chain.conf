# H.U.G.H. — Nginx Configuration for LFM Daisy Chain
#
# Add this to the VPS nginx config to route Audio S2S and VL
# requests to the Proxmox iMac on the local network.
#
# Architecture:
#   Browser → VPS nginx (:443) → {
#     /api/inference/v1/chat/*    → localhost:8080 (LFM Thinking, local VPS)
#     /api/inference/v1/audio/*   → PROXMOX_IP:8082 (LFM Audio S2S, iMac)
#     /api/inference/v1/vl/*      → PROXMOX_IP:8081 (LFM VL, iMac)
#   }
#
# Installation:
#   1. Edit PROXMOX_IP below to your iMac's LAN IP
#   2. scp this file to VPS: /etc/nginx/conf.d/hugh-lfm-chain.conf
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisite: Proxmox iMac must be reachable from VPS
#   Option A: Tailscale/Wireguard VPN between VPS and Proxmox
#   Option B: Cloudflare Tunnel from iMac exposing :8081 and :8082
#   Option C: Port forwarding if both on same network (unlikely)
#

# CHANGE THIS to your Proxmox iMac's LAN/VPN IP
# If using Tailscale: something like 100.x.x.x
# If using Cloudflare Tunnel: use the tunnel hostname instead
upstream lfm_audio_s2s {
    server PROXMOX_IP:8082;
    keepalive 4;
}

upstream lfm_vl {
    server PROXMOX_IP:8081;
    keepalive 4;
}

upstream lfm_thinking {
    server 127.0.0.1:8080;
    keepalive 8;
}

